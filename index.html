<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Descent | Fashion Scroll</title>
    <style>
        :root {
            --gold: #d4af37;
            --marble: #f0f0f0;
            --dark: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            font-family: 'Playfair Display', serif;
            overflow-x: hidden;
        }

        /* The 9:70 Aspect Ratio Container */
        .main-container {
            position: relative;
            width: 100vw;
            height: 700vh; /* Extremely tall for the 70 ratio */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                        url('https://images.unsplash.com/photo-1616486341351-79b940905479?auto=format&fit=crop&q=80&w=1000'); /* Artistic Furniture Background */
            background-attachment: fixed;
            background-size: cover;
        }

        /* The Luxury Stairs */
        .staircase {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Creating a repeating stair pattern using CSS */
            background: 
                linear-gradient(135deg, transparent 49%, var(--gold) 50%, var(--gold) 51%, transparent 52%),
                linear-gradient(to bottom, transparent 95%, rgba(212, 175, 55, 0.3) 100%);
            background-size: 100px 100px;
        }

        /* The Model / Lady */
        .lady {
            position: fixed; /* Stays in viewport */
            top: 20%;
            left: 10%;
            width: 300px;
            height: 500px;
            z-index: 10;
            pointer-events: none;
            transition: transform 0.1s linear;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .lady img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Background Furniture Caricatures */
        .furniture-deco {
            position: absolute;
            opacity: 0.4;
            filter: grayscale(100%) brightness(0.7);
        }

        .furniture-1 { top: 5%; right: 10%; width: 400px; }
        .furniture-2 { top: 25%; left: 5%; width: 350px; }
        .furniture-3 { top: 45%; right: 15%; width: 450px; }
        .furniture-4 { top: 70%; left: 10%; width: 400px; }

        /* UI Elements */
        .overlay-text {
            position: fixed;
            bottom: 50px;
            right: 50px;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.2rem;
            border-right: 2px solid var(--gold);
            padding-right: 20px;
        }

        /* Scroll Indicator */
        .scroll-bar {
            position: fixed;
            right: 10px;
            top: 0;
            width: 2px;
            height: 100%;
            background: rgba(255,255,255,0.1);
        }
        .scroll-progress {
            width: 100%;
            background: var(--gold);
            height: 0%;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Background Furniture (Visual Caricatures) -->
        <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&q=80&w=500" class="furniture-deco furniture-1" alt="Furniture">
        <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&q=80&w=500" class="furniture-deco furniture-2" alt="Furniture">
        <img src="https://images.unsplash.com/photo-1583847268964-b28dc8f51f92?auto=format&fit=crop&q=80&w=500" class="furniture-deco furniture-3" alt="Furniture">

        <div class="staircase"></div>

        <!-- The "Hot Lady" in Luxurious Outfit -->
        <!-- Note: Replace this URL with your specific asset if needed -->
        <div class="lady" id="lady">
            <img src="https://images.unsplash.com/photo-1539109132382-381bb3f1c2b3?auto=format&fit=crop&q=80&w=800" alt="Luxurious Lady Stepping Down">
        </div>
    </div>

    <div class="overlay-text">The Grand Descent</div>
    <div class="scroll-bar"><div class="scroll-progress" id="progress"></div></div>

    <script>
        const lady = document.getElementById('lady');
        const progress = document.getElementById('progress');

        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
            
            // Movement logic:
            // Move Down (Y) based on scroll
            // Move Right (X) to simulate stepping down diagonally
            const moveY = scrollPercent * 400; // Vertical range
            const moveX = scrollPercent * 300; // Horizontal range
            
            // Subtle "Walking" oscillation using Sine wave
            const walkCycle = Math.sin(window.scrollY * 0.05) * 10;

            // Apply transforms
            lady.style.transform = `translate(${moveX}px, ${moveY + walkCycle}px)`;
            
            // Update custom scroll bar
            progress.style.height = (scrollPercent * 100) + "%";
        });
    </script>
</body>
</html>
</body>
</html>
