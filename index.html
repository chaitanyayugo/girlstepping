<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Fashion - The Descent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --height: 7000px; /* Creating the 9:70 verticality */
        }

        body, html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #fcfaf2;
            font-family: 'Playfair Display', serif;
        }

        /* Artistic Furniture Background */
        .bg-furniture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
            opacity: 0.15;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); /* Pattern fallback */
            pointer-events: none;
        }

        /* The Scroll Container */
        .scroll-container {
            height: var(--height);
            position: relative;
        }

        /* The Visual Stage */
        .viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        /* Luxurious Stairs */
        .stairs-container {
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            /* Creating a CSS-based luxury stair visual */
            background: linear-gradient(135deg, transparent 49%, var(--gold) 50%, #fff 51%, transparent 52%);
            background-size: 100px 100px;
            transform: rotate(0deg);
        }

        /* The Lady Character */
        .lady {
            position: absolute;
            width: 300px;
            height: 500px;
            z-index: 10;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            /* Placeholder for the Hot Lady Image */
            background-image: url('https://images.squarespace-cdn.com/content/v1/5769747237c581e1146755a5/1470764137889-YI9STN6Q96M36D0B0A7B/woman-walking.png');
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            will-change: transform;
        }

        /* Decorative UI */
        .overlay-text {
            position: fixed;
            bottom: 50px;
            right: 50px;
            text-align: right;
            z-index: 100;
        }

        .overlay-text h1 {
            font-size: 5rem;
            margin: 0;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 10px;
            opacity: 0.2;
        }

        .scroll-indicator {
            position: fixed;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 100;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
            60% {transform: translateY(-5px) translateX(-50%);}
        }
    </style>
</head>
<body>

    <div class="bg-furniture"></div>
    
    <div class="scroll-indicator">Scroll to Descend</div>

    <div class="overlay-text">
        <h1>Vogue</h1>
        <p>AUTUMN COLLECTION 2024</p>
    </div>

    <div class="scroll-container">
        <div class="viewport">
            <!-- The Lady -->
            <div class="lady" id="lady"></div>
            
            <!-- Structural Stairs -->
            <div class="stairs-container" id="stairs"></div>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Animation for the Lady walking down
        // We calculate the diagonal path based on the stair angle
        gsap.to("#lady", {
            scrollTrigger: {
                trigger: ".scroll-container",
                start: "top top",
                end: "bottom bottom",
                scrub: 1, // Smoothly ties animation to scroll speed
            },
            x: "80vw", // Moves right
            y: "80vh", // Moves down
            rotation: 5, // Slight tilt as she steps
            scale: 1.2, // Gets closer to the camera
            ease: "none"
        });

        // Parallax effect for the stairs to make the "descent" feel infinite
        gsap.to("#stairs", {
            scrollTrigger: {
                trigger: ".scroll-container",
                start: "top top",
                end: "bottom bottom",
                scrub: 0.5,
            },
            backgroundPosition: "-1000px 1000px",
            ease: "none"
        });

        // Add a "bobbing" animation to mimic walking steps
        gsap.to("#lady", {
            y: "-=20",
            repeat: -1,
            yoyo: true,
            duration: 0.5,
            ease: "sine.inOut"
        });
    </script>
</body>
</html>
