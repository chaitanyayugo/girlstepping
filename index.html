<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Descent | Fashion Interaction</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --marble: #ffffff;
            --dark-bg: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            font-family: 'Cinzel', serif;
            overflow-x: hidden;
            /* Height for the 9:70 ratio feel */
            height: 1200vh; 
        }

        /* 1. THE STAIRS (Moving Background) */
        .staircase {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 300%;
            height: 300%;
            /* Luxury Marble Pattern */
            background: 
                linear-gradient(45deg, transparent 48%, var(--gold) 49%, var(--marble) 50%, var(--marble) 60%, transparent 61%);
            background-size: 600px 600px;
            z-index: 1;
            will-change: transform;
        }

        /* 2. THE FURNITURE (Background Caricatures) */
        .furniture {
            position: fixed;
            z-index: 2;
            filter: brightness(0.4) sepia(0.2);
            pointer-events: none;
            will-change: transform;
        }

        /* 3. THE LADY (Guaranteed Visible) */
        .lady-focus {
            position: fixed;
            /* Anchored to the center-ish of the screen */
            top: 45%; 
            left: 40%;
            width: 450px; /* Large enough to see */
            height: 750px;
            /* Force to be ON TOP of everything */
            z-index: 9999; 
            pointer-events: none;
            display: block;
        }

        .lady-focus img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Sexy lighting effect */
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9));
        }

        /* 4. OVERLAYS */
        .luxury-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.8) 100%);
            z-index: 50; /* Above furniture, below Lady */
            pointer-events: none;
        }

        .side-title {
            position: fixed;
            top: 50%;
            right: 50px;
            transform: translateY(-50%) rotate(90deg);
            color: var(--gold);
            font-size: 1.2rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            z-index: 100;
            opacity: 0.6;
        }

        /* Scroll Bar Indicator */
        .progress-bar {
            position: fixed;
            top: 0; left: 0; width: 5px; height: 100%;
            background: rgba(212,175,55,0.1);
            z-index: 1000;
        }
        .progress-fill {
            width: 100%; background: var(--gold); height: 0%;
        }
    </style>
</head>
<body>

    <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    <div class="side-title">LUXURY ASCENSION</div>
    <div class="luxury-overlay"></div>

    <!-- The Stairs -->
    <div class="staircase" id="stairs"></div>

    <!-- Parallax Furniture -->
    <img src="https://images.unsplash.com/photo-1581539250439-c96689b516dd?q=80&w=400" class="furniture" id="f1" style="width: 300px; top: 10%; right: -20%;">
    <img src="https://images.unsplash.com/photo-1533090161767-e6ffed986c88?q=80&w=400" class="furniture" id="f2" style="width: 500px; top: 70%; right: -10%;">
    <img src="https://images.unsplash.com/photo-1594026112284-02bb6f3352fe?q=80&w=400" class="furniture" id="f3" style="width: 300px; top: 30%; left: -10%;">

    <!-- THE LADY (Centered and Fixed) -->
    <div class="lady-focus" id="lady">
        <!-- High-fashion model in luxurious silk dress -->
        <img src="https://images.unsplash.com/photo-1539008835154-333240d71944?q=80&w=1000" alt="Hot Sexy Lady in Luxury Dress">
    </div>

    <script>
        const lady = document.getElementById('lady');
        const stairs = document.getElementById('stairs');
        const fill = document.getElementById('fill');
        const f1 = document.getElementById('f1');
        const f2 = document.getElementById('f2');
        const f3 = document.getElementById('f3');

        window.addEventListener('scroll', () => {
            const scrolled = window.scrollY;
            const scrollPercent = scrolled / (document.documentElement.scrollHeight - window.innerHeight);

            // 1. ANIMATE THE LADY (The "Step" Motion)
            // This creates a realistic "walking down" bobbing effect
            // We use Sine for height and Cosine for subtle hip sway
            const stepY = Math.abs(Math.sin(scrolled * 0.015)) * 30; // Up/down bob
            const swayX = Math.sin(scrolled * 0.008) * 15;        // Side to side hip sway
            const tilt = Math.sin(scrolled * 0.008) * 2;          // Subtle body tilt
            
            lady.style.transform = `translate(${swayX}px, ${stepY}px) rotate(${tilt}deg)`;

            // 2. MOVE THE STAIRS (Treadmill effect)
            // This makes the environment move past her as she "walks"
            const moveX = -(scrolled * 0.6);
            const moveY = -(scrolled * 0.6);
            stairs.style.transform = `translate(${moveX}px, ${moveY}px)`;

            // 3. MOVE FURNITURE (Parallax)
            f1.style.transform = `translate(${-(scrolled * 1.0)}px, ${-(scrolled * 0.3)}px)`;
            f2.style.transform = `translate(${-(scrolled * 1.5)}px, ${-(scrolled * 0.5)}px)`;
            f3.style.transform = `translate(${-(scrolled * 0.4)}px, ${-(scrolled * 0.1)}px)`;

            // 4. UPDATE PROGRESS
            fill.style.height = (scrollPercent * 100) + "%";
        });
    </script>
</body>
</html>
